plugins {
    id 'com.android.application'
}

android {
    namespace 'com.flacplayer'
    compileSdk 34

    defaultConfig {
        applicationId "com.flacplayer"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
}